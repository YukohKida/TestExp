</head>

<body></body>

<script>
/*
  Breath Counting Task for GitHub Pages + jsPsych
  Ported from MATLAB/Psychtoolbox structure.

  Raw response coding:
    resp = 1 : count 1-8 key
    resp = 2 : count 9 key
    resp = 3 : lost count / reset key

  Default keys:
    LeftArrow  : count 1-8
    RightArrow : count 9
    Space      : lost count / reset
*/

/* -----------------------------
 * Utility functions
 * ----------------------------- */

function pad3(n) {
  return String(n).padStart(3, "0");
}

function timestampString() {
  const d = new Date();
  const YYYY = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  const HH = String(d.getHours()).padStart(2, "0");
  const MM = String(d.getMinutes()).padStart(2, "0");
  return `${YYYY}${mm}${dd}${HH}${MM}`;
}

function sanitizeFilenamePart(x) {
  return String(x)
    .trim()
    .replace(/[^\w\-]+/g, "_")
    .replace(/^_+|_+$/g, "");
}

function rowsToCSV(rows, headers) {
  const escapeCell = (value) => {
    if (value === null || value === undefined) return "";
    const s = String(value);
    if (/[",\n\r]/.test(s)) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  };

  const lines = [];
  lines.push(headers.map(escapeCell).join(","));
  for (const row of rows) {
    lines.push(headers.map(h => escapeCell(row[h])).join(","));
  }
  return lines.join("\n");
}

function downloadText(filename, text) {
  const blob = new Blob([text], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.style.display = "none";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function keyMatches(event, targetKey) {
  /*
    Browser KeyboardEvent.key names are used here.
    Typical values:
      ArrowLeft, ArrowRight, Space-like key is usually " " or "Spacebar" in older browsers.
  */
  if (targetKey === " ") {
    return event.key === " " || event.code === "Space" || event.key === "Spacebar";
  }
  return event.key === targetKey || event.code === targetKey;
}

function matlabKeyToBrowserKey(keyName) {
  /*
    MATLAB/Psychtoolbox-style defaults are converted to browser key names.
    You can also pass browser-style names directly.
  */
  const map = {
    "LeftArrow": "ArrowLeft",
    "RightArrow": "ArrowRight",
    "SPACE": " ",
    "Space": " ",
    "space": " ",
    "ESCAPE": "Escape",
    "Escape": "Escape"
  };
  return map[keyName] || keyName;
}

/* -----------------------------
 * Process raw BCT data into cycles
 * ----------------------------- */

function processBCTData(rawRows) {
  /*
    Equivalent target structure to MATLAB cycle matrix:

    cycle_number
    start_press_index
    end_press_index
    n_presses
    termination_key
    time_terminate
    avg_keypress_length
    classification

    classification:
      1 = accurate
      2 = miscount
      3 = reset
  */

  const output = {
    singlesremoved: 0,
    totaltrials: 0,
    number_acc: 0,
    number_mis: 0,
    number_res: 0,
    manualcheck_required: 0
  };

  if (rawRows.length === 0) {
    output.manualcheck_required = 1;
    return { cycles: [], output };
  }

  const endTrials = [];
  rawRows.forEach((row, idx) => {
    if (row.resp === 2 || row.resp === 3) {
      endTrials.push({
        index: idx + 1, // MATLAB-style 1-based index
        termination_key: row.resp
      });
    }
  });

  let cycles = [];

  for (let i = 0; i < endTrials.length; i++) {
    const cycleNumber = i + 1;
    const startPressIndex = (i === 0) ? 1 : endTrials[i - 1].index + 1;
    const endPressIndex = endTrials[i].index;
    const nPresses = (endPressIndex - startPressIndex) + 1;
    const terminationKey = endTrials[i].termination_key;
    const timeTerminate = rawRows[endPressIndex - 1].time;

    let avgKeypressLength;
    if (i === 0) {
      avgKeypressLength = (timeTerminate - 0) / nPresses;
    } else {
      const prevEndTime = rawRows[startPressIndex - 2].time;
      avgKeypressLength = (timeTerminate - prevEndTime) / nPresses;
    }

    cycles.push({
      cycle_number: cycleNumber,
      start_press_index: startPressIndex,
      end_press_index: endPressIndex,
      n_presses: nPresses,
      termination_key: terminationKey,
      time_terminate: timeTerminate,
      avg_keypress_length: avgKeypressLength,
      classification: ""
    });
  }

  // Match MATLAB logic: remove single-response cycles.
  const cutoffthreshold_singletrial = Math.max(...rawRows.map(r => r.time));
  const singlesRemovedDetailed = cycles.filter(
    c => c.n_presses === 1 && c.avg_keypress_length < cutoffthreshold_singletrial
  );

  output.singlesremoved = singlesRemovedDetailed.length;

  cycles = cycles.filter(
    c => !(c.n_presses === 1 && c.avg_keypress_length < cutoffthreshold_singletrial)
  );

  if (output.singlesremoved > 0) {
    cycles = cycles.map((c, i) => ({ ...c, cycle_number: i + 1 }));
  }

  cycles = cycles.map(c => {
    let classification = "";
    if (c.n_presses === 9 && c.termination_key === 2) {
      classification = 1; // accurate
    } else if (c.n_presses !== 9 && c.termination_key === 2) {
      classification = 2; // miscount
    } else if (c.termination_key === 3) {
      classification = 3; // reset
    }
    return { ...c, classification };
  });

  output.totaltrials = cycles.length;
  output.number_acc = cycles.filter(c => c.classification === 1).length;
  output.number_mis = cycles.filter(c => c.classification === 2).length;
  output.number_res = cycles.filter(c => c.classification === 3).length;

  if ((output.number_acc + output.number_mis + output.number_res) !== output.totaltrials) {
    output.manualcheck_required = 1;
  }

  output.singlesremoved_detailed_json = JSON.stringify(singlesRemovedDetailed);

  return { cycles, output };
}

/* -----------------------------
 * Custom jsPsych plugin: BCT main task
 * ----------------------------- */

const jsPsychBCTTask = (function() {
  const plugin = {};

  plugin.info = {
    name: "bct-task",
    parameters: {
      duration_sec: {
        type: jsPsychModule.ParameterType.INT,
        default: 1200
      },
      count_1_8_key: {
        type: jsPsychModule.ParameterType.STRING,
        default: "ArrowLeft"
      },
      count_9_key: {
        type: jsPsychModule.ParameterType.STRING,
        default: "ArrowRight"
      },
      reset_key: {
        type: jsPsychModule.ParameterType.STRING,
        default: " "
      }
    }
  };

  plugin.trial = function(display_element, trial) {
    display_element.innerHTML = `<div class="bct-center"></div>`;

    const rawRows = [];
    const startTime = performance.now();

    function getElapsedSec(t) {
      return (t - startTime) / 1000;
    }

    function computeWithinCycleCount(resp) {
      if (rawRows.length === 0) return 1;
      const prevResp = rawRows[rawRows.length - 1].resp;
      const prevCount = rawRows[rawRows.length - 1].count;

      if (prevResp === 1) {
        return prevCount + 1;
      }
      return 1;
    }

    function onKeyDown(event) {
      let resp = null;

      if (keyMatches(event, trial.count_1_8_key)) {
        resp = 1;
      } else if (keyMatches(event, trial.count_9_key)) {
        resp = 2;
      } else if (keyMatches(event, trial.reset_key)) {
        resp = 3;
      } else if (event.key === "Escape") {
        document.removeEventListener("keydown", onKeyDown);
        clearTimeout(endTimer);
        jsPsych.finishTrial({
          phase: "bct_task",
          terminated_by_escape: true,
          raw_json: JSON.stringify(rawRows)
        });
        return;
      }

      if (resp !== null) {
        event.preventDefault();

        const now = performance.now();
        const count = computeWithinCycleCount(resp);

        const row = {
          time: Number(getElapsedSec(now).toFixed(6)),
          resp: resp,
          count: count,
          key: event.key === " " ? "Space" : event.key,
          rt_ms: Number((now - startTime).toFixed(3))
        };

        rawRows.push(row);

        console.log(
          `${row.time.toFixed(3)} | ${row.resp} | ${row.count}`
        );
      }
    }

    document.addEventListener("keydown", onKeyDown);

    const endTimer = setTimeout(function() {
      document.removeEventListener("keydown", onKeyDown);

      const processed = processBCTData(rawRows);

      jsPsych.finishTrial({
        phase: "bct_task",
        duration_sec: trial.duration_sec,
        count_1_8_key: trial.count_1_8_key,
        count_9_key: trial.count_9_key,
        reset_key: trial.reset_key,
        raw_json: JSON.stringify(rawRows),
        cycle_json: JSON.stringify(processed.cycles),
        output_json: JSON.stringify(processed.output),
        n_raw_presses: rawRows.length,
        n_cycles: processed.cycles.length,
        number_acc: processed.output.number_acc,
        number_mis: processed.output.number_mis,
        number_res: processed.output.number_res,
        singlesremoved: processed.output.singlesremoved,
        manualcheck_required: processed.output.manualcheck_required,
        terminated_by_escape: false
      });
    }, trial.duration_sec * 1000);
  };

  return plugin;
})();

/* -----------------------------
 * Experiment setup
 * ----------------------------- */

let EXP_CONFIG = {
  subjno: "001",
  savecode: "BCT",
  duration_min: 20,
  count_1_8_key: "ArrowLeft",
  count_9_key: "ArrowRight",
  reset_key: " ",
  syncsomno: 0
};

const jsPsych = initJsPsych({
  on_finish: function() {
    const allData = jsPsych.data.get().values();
    const bctTrial = allData.find(row => row.phase === "bct_task");

    const baseName =
      "BCT_" +
      sanitizeFilenamePart(EXP_CONFIG.savecode) +
      "_S" +
      pad3(Number(EXP_CONFIG.subjno)) +
      "_" +
      timestampString();

    if (!bctTrial || !bctTrial.raw_json) {
      downloadText(baseName + "_jspsych_all.csv", jsPsych.data.get().csv());
      return;
    }

    const rawRows = JSON.parse(bctTrial.raw_json);
    const cycleRows = JSON.parse(bctTrial.cycle_json);
    const output = JSON.parse(bctTrial.output_json);

    const rawHeaders = ["time", "resp", "count", "key", "rt_ms"];
    const cycleHeaders = [
      "cycle_number",
      "start_press_index",
      "end_press_index",
      "n_presses",
      "termination_key",
      "time_terminate",
      "avg_keypress_length",
      "classification"
    ];

    const summaryRows = [{
      subjno: EXP_CONFIG.subjno,
      savecode: EXP_CONFIG.savecode,
      duration_min: EXP_CONFIG.duration_min,
      count_1_8_key: EXP_CONFIG.count_1_8_key,
      count_9_key: EXP_CONFIG.count_9_key,
      reset_key: EXP_CONFIG.reset_key,
      syncsomno: EXP_CONFIG.syncsomno,
      total_raw_presses: rawRows.length,
      totaltrials: output.totaltrials,
      number_acc: output.number_acc,
      number_mis: output.number_mis,
      number_res: output.number_res,
      singlesremoved: output.singlesremoved,
      manualcheck_required: output.manualcheck_required,
      singlesremoved_detailed_json: output.singlesremoved_detailed_json
    }];

    const summaryHeaders = Object.keys(summaryRows[0]);

    downloadText(baseName + "_raw.csv", rowsToCSV(rawRows, rawHeaders));
    downloadText(baseName + "_cycle.csv", rowsToCSV(cycleRows, cycleHeaders));
    downloadText(baseName + "_summary.csv", rowsToCSV(summaryRows, summaryHeaders));
    downloadText(baseName + "_jspsych_all.csv", jsPsych.data.get().csv());
  }
});

const timeline = [];

/* -----------------------------
 * Initial setup form
 * ----------------------------- */

timeline.push({
  type: jsPsychSurveyHtmlForm,
  preamble: `
    <div class="instruction">
      呼吸カウント課題<br><br>
      課題設定を入力してください。
    </div>
  `,
  html: `
    <div class="setup-form">
      <label>
        参加者番号
        <input name="subjno" type="number" min="1" value="1" required>
      </label>

      <label>
        保存コード
        <input name="savecode" type="text" value="BCT" required>
      </label>

      <label>
        課題時間（分）
        <input name="duration_min" type="number" min="0.1" step="0.1" value="20" required>
      </label>

      <label>
        1〜8 のカウントに使うキー
        <select name="count_1_8_key">
          <option value="LeftArrow" selected>LeftArrow</option>
          <option value="a">a</option>
          <option value="f">f</option>
          <option value="j">j</option>
        </select>
      </label>

      <label>
        9 のカウントに使うキー
        <select name="count_9_key">
          <option value="RightArrow" selected>RightArrow</option>
          <option value="l">l</option>
          <option value="j">j</option>
          <option value="f">f</option>
        </select>
      </label>

      <label>
        カウント忘れ / リセットに使うキー
        <select name="reset_key">
          <option value="SPACE" selected>SPACE</option>
          <option value="z">z</option>
          <option value="x">x</option>
        </select>
      </label>

      <label>
        3秒カウントダウン
        <select name="syncsomno">
          <option value="0" selected>なし</option>
          <option value="1">あり</option>
        </select>
      </label>

      <p class="small-note">
        デフォルトのキー割り当ては MATLAB 版に合わせています：
        LeftArrow = 1〜8 のカウント，RightArrow = 9 のカウント，Space = カウント忘れ / リセット。
      </p>
    </div>
  `,
  button_label: "続ける",
  on_finish: function(data) {
    const response = data.response;

    EXP_CONFIG.subjno = response.subjno;
    EXP_CONFIG.savecode = response.savecode;
    EXP_CONFIG.duration_min = Number(response.duration_min);
    EXP_CONFIG.count_1_8_key = matlabKeyToBrowserKey(response.count_1_8_key);
    EXP_CONFIG.count_9_key = matlabKeyToBrowserKey(response.count_9_key);
    EXP_CONFIG.reset_key = matlabKeyToBrowserKey(response.reset_key);
    EXP_CONFIG.syncsomno = Number(response.syncsomno);

    data.phase = "setup";
    data.subjno = EXP_CONFIG.subjno;
    data.savecode = EXP_CONFIG.savecode;
    data.duration_min = EXP_CONFIG.duration_min;
    data.count_1_8_key = EXP_CONFIG.count_1_8_key;
    data.count_9_key = EXP_CONFIG.count_9_key;
    data.reset_key = EXP_CONFIG.reset_key;
    data.syncsomno = EXP_CONFIG.syncsomno;
  }
});

timeline.push({
  type: jsPsychFullscreen,
  fullscreen_mode: true,
  message: `
    <div class="instruction">
      実験はフルスクリーンで実施されます。<br><br>
      下のボタンを押して続けてください。
    </div>
  `,
  button_label: "フルスクリーンにする"
});

/* -----------------------------
 * Instructions
 * ----------------------------- */

const instruction1 = `この課題では，
呼吸に意識を向けてもらいます。

鼻の下から上唇の上あたりの空間で感じられる，
息が出入りする動きに注意を向けてください。

呼吸をコントロールする必要はありません。

普段どおりに呼吸してください。


<右矢印キー> を押して続けてください。`;

const instruction2 = `途中で，
注意が呼吸からそれていることに
気づくかもしれません。

それで問題ありません。
気づいたら，静かに注意を呼吸へ戻してください。


<右矢印キー> を押して続けてください。`;

const instruction3 = `呼吸への注意を保つために，
注意の一部を使って，
心の中で呼吸を 1 から 9 まで繰り返し数えてください。

吸う息と吐く息を合わせて，1 カウントとします。

数は心の中で小さく唱えるようにし，
注意の大部分は呼吸の感覚に向けてください。

呼吸 1〜8 では，人差し指で <左矢印キー> を押してください。
呼吸 9 では，薬指で <右矢印キー> を押してください。

つまり，呼吸ごとにキーを1回押します。


<右矢印キー> を押して続けてください。`;

const instruction4 = `もし途中で数を忘れた場合は，

左手の人差し指で <スペースキー> を押してください。

次の呼吸から，1 に戻って数え直してください。

指を使って数えるのではなく，
心の中だけで数えてください。

<右矢印キー> を押して続けてください。`;

function instruction5Text() {
  if (EXP_CONFIG.syncsomno) {
    return `楽で安定した，背筋を伸ばした姿勢で座ってください。

実験中は，目を少なくとも半分ほど開けたままにし，
画面に自然に視線を向けておいてください。

課題時間は約 ${EXP_CONFIG.duration_min} 分です。


<スペースキー> を押して続けてください。`;
  }

  return `楽で安定した，背筋を伸ばした姿勢で座ってください。

実験中は，目を少なくとも半分ほど開けたままにし，
画面に自然に視線を向けておいてください。

課題時間は約 ${EXP_CONFIG.duration_min} 分です。


<スペースキー> を押すと開始します。`;
}

function instructionTrial(textFunctionOrString, choices) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: function() {
      const text = (typeof textFunctionOrString === "function")
        ? textFunctionOrString()
        : textFunctionOrString;
      return `<div class="instruction">${text}</div>`;
    },
    choices: choices,
    data: { phase: "instruction" }
  };
}

timeline.push(instructionTrial(instruction1, ["ArrowRight"]));
timeline.push(instructionTrial(instruction2, ["ArrowRight"]));
timeline.push(instructionTrial(instruction3, ["ArrowRight"]));
timeline.push(instructionTrial(instruction4, ["ArrowRight"]));
timeline.push(instructionTrial(instruction5Text, [" "]));

/* -----------------------------
 * Optional sync countdown
 * ----------------------------- */

timeline.push({
  timeline: [
    {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="instruction">
          息を吸い，スペースキーを押すと開始します<br>
          3秒カウントダウン
        </div>
      `,
      choices: [" "],
      data: { phase: "sync_wait" }
    },
    {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `<div class="instruction">息を吐いてください<br><br>3</div>`,
      choices: "NO_KEYS",
      trial_duration: 1000,
      data: { phase: "countdown", countdown_number: 3 }
    },
    {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `<div class="instruction">息を吐いてください<br><br>2</div>`,
      choices: "NO_KEYS",
      trial_duration: 1000,
      data: { phase: "countdown", countdown_number: 2 }
    },
    {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `<div class="instruction">息を吐いてください<br><br>1</div>`,
      choices: "NO_KEYS",
      trial_duration: 1000,
      data: { phase: "countdown", countdown_number: 1 }
    }
  ],
  conditional_function: function() {
    return EXP_CONFIG.syncsomno === 1;
  }
});

/* -----------------------------
 * Main BCT task
 * ----------------------------- */

timeline.push({
  type: jsPsychBCTTask,
  duration_sec: function() {
    return EXP_CONFIG.duration_min * 60;
  },
  count_1_8_key: function() {
    return EXP_CONFIG.count_1_8_key;
  },
  count_9_key: function() {
    return EXP_CONFIG.count_9_key;
  },
  reset_key: function() {
    return EXP_CONFIG.reset_key;
  }
});

/* -----------------------------
 * End screen
 * ----------------------------- */

timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div class="instruction">
      課題は終了です<br><br><br>
      実験者に知らせてください。<br><br>
      Escape キーを押すと終了し，データをダウンロードします。
    </div>
  `,
  choices: ["Escape"],
  data: { phase: "end_screen" }
});

timeline.push({
  type: jsPsychFullscreen,
  fullscreen_mode: false,
  delay_after: 0
});

jsPsych.run(timeline);
</script>
</html>
